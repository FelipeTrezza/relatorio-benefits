name: Funil de Campanha — Query Databricks

on:
  repository_dispatch:
    types: [funil-query]

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -q databricks-sdk

      - name: Executar query
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          ACTIVITY_NAME: ${{ github.event.client_payload.activity }}
          DATE_FROM: ${{ github.event.client_payload.date_from }}
          DATE_TO: ${{ github.event.client_payload.date_to }}
          REQUEST_ID: ${{ github.event.client_payload.request_id }}
        run: |
          # Rodar com stderr visível no log para debug
          python3 funil_query_helper_ci.py 2>&1 | tee results/$REQUEST_ID.json
          # Verificar se o JSON está ok
          python3 -c "
import json, sys
with open('results/$REQUEST_ID.json') as f:
    d = json.load(f)
if d.get('ok'):
    print(f'✅ Query OK — {len(d.get(\"rows\",[]))} rows')
else:
    print(f'❌ Erro: {d.get(\"error\",\"desconhecido\")}')
    sys.exit(1)
"

      - name: Commit resultado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "result: ${{ github.event.client_payload.request_id }}" || echo "nada a commitar"
          git push

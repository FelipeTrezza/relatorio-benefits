name: Funil de Campanha — Query Databricks

on:
  repository_dispatch:
    types: [funil-query]

jobs:
  query:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -q databricks-sdk

      - name: Obter access token
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_REFRESH_TOKEN: ${{ secrets.DATABRICKS_REFRESH_TOKEN }}
        run: python3 get_token.py

      - name: Executar query
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ env.DATABRICKS_ACCESS_TOKEN }}
          ACTIVITY_NAME: ${{ github.event.client_payload.activity }}
          JOURNEY_NAME: ${{ github.event.client_payload.journey }}
          DATE_FROM: ${{ github.event.client_payload.date_from }}
          DATE_TO: ${{ github.event.client_payload.date_to }}
          REQUEST_ID: ${{ github.event.client_payload.request_id }}
        run: python3 funil_query_helper_ci.py > results/${{ github.event.client_payload.request_id }}.json

      - name: Verificar resultado
        env:
          REQUEST_ID: ${{ github.event.client_payload.request_id }}
        run: python3 verify_result.py

      - name: Commit resultado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git commit -m "result: ${{ github.event.client_payload.request_id }}" || echo "nada a commitar"
          git push

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Antecipações de Salário — Benefits</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --surf2:   #1c2330;
    --border:  #30363d;
    --green:   #21a366;
    --greenl:  #2dc974;
    --greend:  #177a4d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --inss:    #58a6ff;
    --priv:    #f0883e;
    --grupo:   #bc8cff;
    --red:     #f85149;
    --yellow:  #e3b341;
    /* cor do fundo dos metric-cards — mesmo da foto (cinza claro no light, surf2 no dark) */
    --card-bg: #1c2330;
    --card-border: #30363d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:14px}

  /* ── NAV ──────────────────────────────────────────────────── */
  .nav-tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px;display:flex;gap:0}
  .nav-tab{padding:11px 18px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;text-decoration:none;transition:all .2s;display:flex;align-items:center;gap:7px}
  .nav-tab:hover{color:var(--text)}
  .nav-tab.active{color:var(--text);border-bottom-color:var(--green);font-weight:600}

  /* ── HEADER ───────────────────────────────────────────────── */
  header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 28px;display:flex;align-items:center;justify-content:space-between}
  .hdr-left{display:flex;align-items:center;gap:11px}
  .hdr-logo{width:32px;height:32px}
  .hdr-title{font-size:16px;font-weight:700}
  .hdr-sub{font-size:11px;color:var(--muted);margin-top:1px}
  .hdr-right{display:flex;align-items:center;gap:10px}
  .badge-periodo{background:var(--greend);color:var(--greenl);font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;border:1px solid var(--green)}
  .btn-refresh{display:flex;align-items:center;gap:6px;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap}
  .btn-refresh:hover{border-color:var(--green);color:var(--greenl);background:#1a2a22}
  .btn-refresh svg{transition:transform .6s}
  .btn-refresh.spinning svg{animation:spin .8s linear infinite}
  .btn-refresh .upd-ts{font-size:10px;color:var(--muted);font-weight:400}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* ── MAIN ─────────────────────────────────────────────────── */
  main{max-width:1520px;margin:0 auto;padding:22px 28px}

  /* ── PERIODO LABEL ───────────────────────────────────────── */
  .periodo-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
  .periodo-title{font-size:13px;font-weight:700;color:var(--text)}
  .periodo-sub{font-size:11px;color:var(--muted);margin-top:2px}

  /* ── GRID PRINCIPAL: 4 colunas ────────────────────────────── */
  .dashboard-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:16px;
  }

  /* ── COLUNA DE SETOR ──────────────────────────────────────── */
  .setor-col{}

  /* ── PILL HEADER (estilo da foto) ─────────────────────────── */
  .pill-header{
    border-radius:40px;
    padding:10px 0;
    text-align:center;
    font-size:17px;
    font-weight:800;
    color:#fff;
    margin-bottom:14px;
    letter-spacing:.3px;
  }
  .pill-total  {background:linear-gradient(135deg,#1a6640,#21a366)}
  .pill-publico{background:linear-gradient(135deg,#1f7a45,#27b96a)}
  .pill-privado{background:linear-gradient(135deg,#3a8a52,#4db870)}
  .pill-grupo  {background:linear-gradient(135deg,#5aa668,#7ec87e)}

  /* ── GRID DE MÉTRICAS ────────────────────────────────────── */

  /* ── METRIC CARD ─────────────────────────────────────────── */
  .mc{
    background:var(--card-bg);
    border:1px solid var(--card-border);
    border-radius:14px;
    padding:14px 14px 12px;
    display:flex;
    flex-direction:column;
    gap:5px;
    height:100px;          /* altura fixa igual em todos */
    box-sizing:border-box;
  }
  /* grid alinha as linhas pela maior célula → todos ficam igual */
  .metrics-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    grid-auto-rows:1fr;    /* linhas de altura uniforme */
    gap:10px;
    align-items:stretch;
  }
  .mc-lbl{
    font-size:10px;
    font-weight:600;
    color:var(--muted);
    text-transform:none;
    letter-spacing:.1px;
    line-height:1.3;
  }
  .mc-val{
    font-size:26px;
    font-weight:800;
    color:var(--greenl);
    line-height:1;
    letter-spacing:-0.5px;
  }
  .mc-delta{
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    gap:3px;
  }
  .mc-delta.up{color:var(--greenl)}
  .mc-delta.dn{color:var(--red)}
  .mc-delta.fl{color:var(--muted)}

  /* ── FOOTER ───────────────────────────────────────────────── */
  footer{text-align:center;padding:18px;color:var(--muted);font-size:11px;border-top:1px solid var(--border);margin-top:8px}
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="hdr-left">
    <svg class="hdr-logo" viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#21a366"/><text x="16" y="21" text-anchor="middle" font-size="14" font-weight="bold" fill="white">P</text></svg>
    <div>
      <div class="hdr-sub">Benefits · Antecipações de Salário</div>
      <div class="hdr-title">Relatório Gerencial</div>
    </div>
  </div>
  <div class="hdr-right">
    <span class="badge-periodo" id="badge-periodo">—</span>
    <button class="btn-refresh" id="btn-refresh" onclick="refreshData()" title="Atualizar dados">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Atualizar
      <span class="upd-ts" id="upd-ts"></span>
    </button>
  </div>
</header>

<!-- NAV -->
<nav class="nav-tabs">
  <a class="nav-tab" href="index.html">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 2c1.29 0 2.49.38 3.5 1.03L3.03 11.5A5.97 5.97 0 0 1 2 8c0-3.31 2.69-6 6-6zm0 12c-1.29 0-2.49-.38-3.5-1.03l8.47-8.47A5.97 5.97 0 0 1 14 8c0 3.31-2.69 6-6 6z"/></svg>
    Abertura de Contas
  </a>
  <a class="nav-tab active" href="antecipacoes.html">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M1.5 1a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 0h4a.5.5 0 0 1 0 1h-4zM10 .5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 16 1.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zM.5 10a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/></svg>
    Antecipações
  </a>

  <a class="nav-tab" href="pix.html">
    <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor"><path d="M9.5 2a.5.5 0 0 1 .5.5V6h3.5a.5.5 0 0 1 0 1H10v3.5a.5.5 0 0 1-1 0V7H5.5a.5.5 0 0 1 0-1H9V2.5a.5.5 0 0 1 .5-.5z"/></svg>
    PIX
  </a>
</nav>

<main>

  <!-- PERIODO BAR -->
  <div class="periodo-bar">
    <div>
      <div class="periodo-title" id="periodo-title">— vs —</div>
      <div class="periodo-sub">Comparativo MTD — mesma janela de dias úteis</div>
    </div>
  </div>

  <!-- DASHBOARD GRID -->
  <div class="dashboard-grid" id="dashboard-grid">
    <!-- preenchido por renderDashboard() -->
  </div>

</main>

<footer>
  Benefits Analytics · Atualizado em <span id="footer-date"></span>
</footer>

<script>
// ================================================================
// DADOS — injetados por atualizar_antecipacoes.py
// ================================================================
const DATA = {
  "cur_label": "Mar/26",
  "prev_label": "Fev/26",
  "setores": {
    "public": {
      "vidas": 27229,
      "vidas_prv": 41450,
      "antecipacoes": 96680,
      "antecip_prv": 218479,
      "tpv": 18519478.48,
      "tpv_prv": 49836419.96,
      "abertura": 2090,
      "abertura_prv": 2136,
      "vidas_novas": 1627,
      "vidas_novas_prv": 1943
    },
    "private": {
      "vidas": 1907,
      "vidas_prv": 2019,
      "antecipacoes": 7712,
      "antecip_prv": 8355,
      "tpv": 600446.02,
      "tpv_prv": 691675.48,
      "abertura": 521,
      "abertura_prv": 503,
      "vidas_novas": 240,
      "vidas_novas_prv": 289
    },
    "grupo": {
      "vidas": 51574,
      "vidas_prv": 50086,
      "antecipacoes": 202335,
      "antecip_prv": 190298,
      "tpv": 27564384.3,
      "tpv_prv": 26966850.96,
      "abertura": 1894,
      "abertura_prv": 2400,
      "vidas_novas": 4184,
      "vidas_novas_prv": 4176
    },
    "INSS": {
      "vidas": 0,
      "vidas_prv": 0,
      "antecipacoes": 0,
      "antecip_prv": 0,
      "tpv": 0.0,
      "tpv_prv": 0.0,
      "abertura": 777,
      "abertura_prv": 427,
      "vidas_novas": 0,
      "vidas_novas_prv": 0
    }
  }
};

// ================================================================
// HELPERS
// ================================================================
function fmtVal(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n/1e9).toFixed(1).replace('.',',') + 'Bi';
  if (abs >= 1e6) return (n/1e6).toFixed(1).replace('.',',') + 'Mi';
  if (abs >= 1e3) return (n/1e3).toFixed(1).replace('.',',') + 'k';
  return n.toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function fmtBRL(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e6) return 'R$ ' + (n/1e6).toFixed(1).replace('.',',') + 'Mi';
  if (abs >= 1e3) return 'R$ ' + (n/1e3).toFixed(1).replace('.',',') + 'K';
  return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function fmtTicket(n) {
  if (!n) return '—';
  return n.toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function fmtInt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('pt-BR');
}
function delta(cur, prv) {
  if (!prv) return {cls:'fl', txt:'—'};
  const p = (cur - prv) / prv * 100;
  const sign = p >= 0 ? '↑' : '↓';
  const cls  = p > 0 ? 'up' : p < 0 ? 'dn' : 'fl';
  return {cls, txt: `${sign}${Math.abs(p).toFixed(2).replace('.',',')}%`};
}

// ================================================================
// RENDER
// ================================================================
function mc(label, valCur, valPrv, fmt) {
  const v  = fmt(valCur);
  const d  = delta(valCur, valPrv);
  return `<div class="mc">
    <div class="mc-lbl">${label}</div>
    <div class="mc-val">${v}</div>
    <div class="mc-delta ${d.cls}">${d.txt}</div>
  </div>`;
}

function renderDashboard() {
  const D = DATA;
  const CL = D.cur_label  || 'Atual';
  const PL = D.prev_label || 'Ant.';

  document.getElementById('periodo-title').textContent = `${CL} vs ${PL}`;
  document.getElementById('badge-periodo').textContent = `${CL} vs ${PL}`;

  // ordem de colunas: total, public, private, grupo
  const COLS = [
    { key: 'total',   label: 'Total',   pill: 'pill-total'   },
    { key: 'public',  label: 'Público', pill: 'pill-publico' },
    { key: 'private', label: 'Privado', pill: 'pill-privado' },
    { key: 'grupo',   label: 'Grupo',   pill: 'pill-grupo'   },
  ];

  // agrega total a partir dos setores
  const allSetores = ['public','private','grupo','INSS'];
  function sumField(field) {
    return allSetores.reduce((s,k) => s + ((D.setores[k] && D.setores[k][field]) || 0), 0);
  }

  D.setores.total = {
    vidas:          sumField('vidas'),
    vidas_prv:      sumField('vidas_prv'),
    antecipacoes:   sumField('antecipacoes'),
    antecip_prv:    sumField('antecip_prv'),
    tpv:            sumField('tpv'),
    tpv_prv:        sumField('tpv_prv'),
    abertura:       sumField('abertura'),
    abertura_prv:   sumField('abertura_prv'),
    vidas_novas:    sumField('vidas_novas'),
    vidas_novas_prv:sumField('vidas_novas_prv'),
  };

  const grid = document.getElementById('dashboard-grid');
  grid.innerHTML = '';

  COLS.forEach(col => {
    const s = D.setores[col.key];
    if (!s) return;

    const tk_cur = s.vidas     > 0 ? s.tpv     / s.antecipacoes : 0;
    const tk_prv = s.vidas_prv > 0 ? s.tpv_prv / s.antecip_prv  : 0;

    const html = `
    <div class="setor-col">
      <div class="pill-header ${col.pill}">${col.label}</div>
      <div class="metrics-grid">
        ${mc('Vidas Antecipando #',    s.vidas,          s.vidas_prv,       fmtVal)}
        ${mc('Antecipações #',         s.antecipacoes,   s.antecip_prv,     fmtVal)}
        ${mc('TPV R$',                 s.tpv,            s.tpv_prv,         fmtBRL)}
        ${mc('Ticket Médio R$',        tk_cur,           tk_prv,            fmtBRL)}
        ${mc('Abertura de Conta #',    s.abertura,       s.abertura_prv,    fmtVal)}
        ${mc('Vidas Novas Antecipando #', s.vidas_novas, s.vidas_novas_prv, fmtInt)}
      </div>
    </div>`;
    grid.insertAdjacentHTML('beforeend', html);
  });
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  const now = new Date();
  document.getElementById('footer-date').textContent =
    now.toLocaleDateString('pt-BR',{year:'numeric',month:'long',day:'numeric'}) + ' ' +
    now.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});

  renderDashboard();
});

function refreshData() {
  const btn = document.getElementById('btn-refresh');
  btn.classList.add('spinning');
  btn.disabled = true;
  btn.title = 'Recarregando...';
  setTimeout(() => { window.location.reload(); }, 800);
}

(function setUpdTs(){
  const el = document.getElementById('upd-ts');
  if (!el) return;
  const now = new Date();
  el.textContent = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
})();
</script>
</body>
</html>

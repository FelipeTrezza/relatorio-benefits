<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!-- auto-refresh via JS — só recarrega fora do fullscreen -->
<title>Benefits Analytics — TV</title>
<style>
  :root {
    --bg:      #0d1117;
    --surface: #161b22;
    --surf2:   #1c2330;
    --border:  #30363d;
    --green:   #21a366;
    --greenl:  #2dc974;
    --greend:  #177a4d;
    --text:    #e6edf3;
    --muted:   #8b949e;
    --inss:    #58a6ff;
    --priv:    #f0883e;
    --grupo:   #bc8cff;
    --red:     #f85149;
    --yellow:  #e3b341;
    --card-bg: #1c2330;
    --card-border: #30363d;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}

  /* ── SLIDE ENGINE ──────────────────────────────────────── */
  .slide{
    position:absolute;top:0;left:0;right:0;bottom:0;
    display:flex;flex-direction:column;padding:24px 32px 16px;
    opacity:0;transition:opacity .8s ease;pointer-events:none;
  }
  .slide.active{opacity:1;pointer-events:auto}

  /* ── HEADER ────────────────────────────────────────────── */
  .tv-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-shrink:0}
  .tv-brand{display:flex;align-items:center;gap:12px}
  .tv-logo{width:36px;height:36px}
  .tv-title{font-size:clamp(20px,1.8vw,32px);font-weight:700}
  .tv-sub{font-size:clamp(13px,1.1vw,18px);color:var(--muted);margin-top:2px}
  .tv-meta{text-align:right}
  .tv-periodo{font-size:clamp(26px,2.4vw,42px);font-weight:800;color:var(--greenl)}
  .tv-updated{font-size:clamp(12px,1vw,17px);color:var(--muted);margin-top:3px}

  /* ── SLIDE TITLE ───────────────────────────────────────── */
  .slide-title{
    font-size:clamp(22px,2vw,36px);font-weight:800;color:var(--text);
    text-transform:uppercase;letter-spacing:1.2px;
    text-align:center;margin-bottom:14px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;gap:10px;
  }
  .slide-title::before,.slide-title::after{
    content:'';display:inline-block;height:3px;width:60px;
    background:linear-gradient(90deg,transparent,var(--green));border-radius:2px;
  }
  .slide-title::after{background:linear-gradient(90deg,var(--green),transparent)}

  /* ── DASHBOARD GRID ────────────────────────────────────── */
    .dashboard-grid{
    display:grid;
    grid-template-columns: minmax(0, 1.15fr) repeat(3, minmax(0, 1fr));
    gap:12px;
    flex:1;
    min-height:0;
  }
    .setor-col{display:flex;flex-direction:column;gap:8px;min-height:0}

  /* ── COLUNA TOTAL — destaque TV ──────────────────────────── */
  .setor-col.col-total{
    background: #0e2318;
    border: 2px solid #21a366;
    border-radius: 16px;
    padding: 10px 8px 8px;
    box-shadow: 0 0 0 1px rgba(33,163,102,.15), 0 4px 28px rgba(33,163,102,.25);
    position: relative;
  }
  .setor-col.col-total .pill-header{
    background: linear-gradient(135deg, #21a366, #2dc974) !important;
    box-shadow: 0 2px 12px rgba(33,163,102,.5);
    letter-spacing: 1px;
  }
  .setor-col.col-total .mc{
    background: rgba(33,163,102,.10);
    border: 1px solid rgba(33,163,102,.30);
  }
  .setor-col.col-total .mc-val{
    color: #ffffff;
    font-size: 44px;
  }
  .setor-col.col-total .mc-lbl{
    color: rgba(255,255,255,.6);
  }

    /* ── PILL HEADER ───────────────────────────────────────── */
  .pill-header{
    border-radius:40px;padding:7px 0;text-align:center;
    font-size:clamp(12px,1.1vw,18px);font-weight:800;color:#fff;letter-spacing:.3px;flex-shrink:0;
  }
  .pill-total  {background:linear-gradient(135deg,#0d4d2e,#21a366)}
  .pill-publico{background:linear-gradient(135deg,#1f7a45,#27b96a)}
  .pill-privado{background:linear-gradient(135deg,#3a8a52,#4db870)}
  .pill-grupo  {background:linear-gradient(135deg,#5aa668,#7ec87e)}

  /* ── METRICS GRID ──────────────────────────────────────── */
  .metrics-grid{
    display:grid;grid-template-columns:1fr 1fr;
    grid-auto-rows:1fr;gap:8px;flex:1;min-height:0;
  }
  .mc{
    background:var(--card-bg);border:1px solid var(--card-border);
    border-radius:12px;padding:8px 10px;
    display:flex;flex-direction:column;justify-content:space-between;
    min-height:0;overflow:hidden;
  }
  .mc-lbl{font-size:20px;font-weight:600;color:var(--muted);letter-spacing:.1px;line-height:1.2;text-align:left;align-self:flex-start;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:100%}
  .mc-val{font-size:40px;font-weight:800;color:var(--greenl);line-height:1.1;letter-spacing:-0.3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left;align-self:flex-start}
  .mc-delta{font-size:32px;font-weight:700;text-align:left;align-self:flex-start}
  .mc-delta.up{color:var(--greenl)} .mc-delta.dn{color:var(--red)} .mc-delta.fl{color:var(--muted)}

  /* ── PROGRESS BAR ──────────────────────────────────────── */
  .tv-progress{
    flex-shrink:0;margin-top:10px;
    display:flex;align-items:center;gap:10px;
  }
  .progress-dots{display:flex;gap:8px;justify-content:center;flex:1}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .3s}
  .dot.active{background:var(--greenl)}
  .progress-bar-wrap{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-bar-fill{height:100%;background:var(--greenl);border-radius:2px;width:0%;transition:width linear}
  /* ── FULLSCREEN BUTTON ─────────────────────────────────── */
  .btn-fullscreen{
    position:fixed;bottom:18px;right:18px;z-index:999;
    background:var(--surf2);border:1px solid var(--border);
    color:var(--text);width:38px;height:38px;border-radius:50%;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:all .2s;opacity:.55;
  }
  .btn-fullscreen:hover{opacity:1;border-color:var(--green);color:var(--greenl);background:#1a2a22}
  .btn-fullscreen svg{flex-shrink:0}
</style>
</head>
<body>

<!-- ── SLIDE 1: Todas as Antecipações ───────────────────── -->

<!-- ── SLIDE 2: PIX ──────────────────────────────────────── -->
<div class="slide" id="slide-1">

      <svg class="tv-logo" viewBox="0 0 36 36"><circle cx="18" cy="18" r="18" fill="#21a366"/><text x="18" y="24" text-anchor="middle" font-size="16" font-weight="bold" fill="white">P</text></svg>
      <div>
        <div class="tv-sub">Benefits · Antecipações PIX</div>

<!-- ── BOTÃO FULLSCREEN ──────────────────────────────────── -->
<button class="btn-fullscreen" id="btn-fs" onclick="toggleFullscreen()" title="Modo apresentação (F11)">
  <svg id="fs-icon-enter" width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
    <path d="M1.5 1h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4A1.5 1.5 0 0 1 1.5 1zm9 0h4A1.5 1.5 0 0 1 16 2.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1 0-1zM.5 9.5a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 0 14.5v-4a.5.5 0 0 1 .5-.5zm15 0a.5.5 0 0 1 .5.5v4a1.5 1.5 0 0 1-1.5 1.5h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5z"/>
  </svg>
  <svg id="fs-icon-exit" width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="display:none">
    <path d="M5.5 0a.5.5 0 0 1 .5.5v4A1.5 1.5 0 0 1 4.5 6h-4a.5.5 0 0 1 0-1h4a.5.5 0 0 0 .5-.5v-4a.5.5 0 0 1 .5-.5zm5 0a.5.5 0 0 1 .5.5v4a.5.5 0 0 0 .5.5h4a.5.5 0 0 1 0 1h-4A1.5 1.5 0 0 1 10 4.5v-4a.5.5 0 0 1 .5-.5zM0 10.5a.5.5 0 0 1 .5-.5h4A1.5 1.5 0 0 1 6 11.5v4a.5.5 0 0 1-1 0v-4a.5.5 0 0 0-.5-.5h-4a.5.5 0 0 1-.5-.5zm10 1a1.5 1.5 0 0 1 1.5-1.5h4a.5.5 0 0 1 0 1h-4a.5.5 0 0 0-.5.5v4a.5.5 0 0 1-1 0v-4z"/>
  </svg>
</button>
<script>
// ================================================================
// FULLSCREEN
// ================================================================
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen();
  }
}
document.addEventListener('fullscreenchange', () => {
  const full = !!document.fullscreenElement;
  document.getElementById('fs-icon-enter').style.display = full ? 'none' : '';
  document.getElementById('fs-icon-exit').style.display  = full ? ''     : 'none';
  document.getElementById('btn-fs').title = full ? 'Sair (Esc)' : 'Modo apresentação (F)';
});
// Auto-refresh a cada 5 min — só quando NÃO está em fullscreen
setInterval(() => {
  if (!document.fullscreenElement) {
    window.location.reload();
  }
}, 300000);

document.addEventListener('keydown', e => {
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === 'ArrowRight' || e.key === ' ') goToSlide(currentSlide + 1);
  if (e.key === 'ArrowLeft') goToSlide(currentSlide - 1);
});

// ================================================================
// DADOS — injetados por atualizar_antecipacoes.py + atualizar_pix.py
// ================================================================
const DATA     = {

  "prev_label": "Mar/26",
  "setores": {

    },
    "private": {

      "vidas_prv": 1463,
      "antecipacoes": 3700,
      "antecip_prv": 4045,
      "tpv": 300277.5,
      "tpv_prv": 327844.52,
      "abertura": 251,
      "abertura_prv": 282,

      "vidas_novas_prv": 134
    },
    "grupo": {

      "vidas_prv": 49542,
      "antecipacoes": 190003,
      "antecip_prv": 191260,
      "tpv": 25222545.58,

    },
    "INSS": {

      "vidas_novas_prv": 0
    }
  }
};
const DATA_PIX = {
  "cur_label": "Abr/26",
  "prev_label": "Mar/26",
  "setores": {
    "public": {
      "vidas": 2085,
      "vidas_prv": 2147,
      "antecipacoes": 8877,
      "antecip_prv": 8182,
      "tpv": 674327.71,
      "tpv_prv": 606802.53,
      "abertura": 981,

    },
    "private": {
      "vidas": 159,

      "antecipacoes": 549,
      "antecip_prv": 496,
      "tpv": 19699.96,
      "tpv_prv": 18725.64,
      "abertura": 224,
      "abertura_prv": 275,

    },

    }
  }
};
const UPDATED  = '14/04/2026 08:54';

const SLIDES_DATA = [DATA, DATA_PIX];
const INTERVAL_MS = 60000; // 1 minuto por slide

// ================================================================
// HELPERS
// ================================================================
function fmtVal(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e9) return (n/1e9).toFixed(1).replace('.',',') + 'Bi';
  if (abs >= 1e6) return (n/1e6).toFixed(1).replace('.',',') + 'Mi';
  if (abs >= 1e3) return (n/1e3).toFixed(1).replace('.',',') + 'k';
  return n.toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function fmtBRL(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  const abs = Math.abs(n);
  if (abs >= 1e6) return 'R$ ' + (n/1e6).toFixed(1).replace('.',',') + 'Mi';
  if (abs >= 1e3) return 'R$ ' + (n/1e3).toFixed(1).replace('.',',') + 'K';
  return 'R$ ' + n.toLocaleString('pt-BR', {minimumFractionDigits:1, maximumFractionDigits:1});
}
function fmtInt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n).toLocaleString('pt-BR');
}
function delta(cur, prv) {
  if (!prv) return {cls:'fl', txt:'—'};
  const p = (cur - prv) / prv * 100;
  return {cls: p>0?'up':p<0?'dn':'fl', txt: (p>=0?'↑ +':'↓ ')+Math.abs(p).toFixed(2).replace('.',',')+'%'};
}
function mc(label, valCur, valPrv, fmt) {
  const v = fmt(valCur);
  const d = delta(valCur, valPrv);
  return `<div class="mc">
    <div class="mc-lbl">${label}</div>
    <div class="mc-val">${v}</div>
    <div class="mc-delta ${d.cls}">${d.txt}</div>
  </div>`;
}

// ================================================================
// RENDER SLIDE
// ================================================================
function renderGrid(gridId, D) {
  const COLS = [
    {key:'total',   label:'Total',   pill:'pill-total'},
    {key:'public',  label:'Público', pill:'pill-publico'},
    {key:'private', label:'Privado', pill:'pill-privado'},
    {key:'grupo',   label:'Grupo',   pill:'pill-grupo'},
  ];

  const allSetores = ['public','private','grupo','INSS'];
  const sum = f => allSetores.reduce((s,k) => s + ((D.setores[k]&&D.setores[k][f])||0), 0);
  D.setores.total = {
    vidas:sum('vidas'), vidas_prv:sum('vidas_prv'),
    antecipacoes:sum('antecipacoes'), antecip_prv:sum('antecip_prv'),
    tpv:sum('tpv'), tpv_prv:sum('tpv_prv'),
    abertura:sum('abertura'), abertura_prv:sum('abertura_prv'),
    vidas_novas:sum('vidas_novas'), vidas_novas_prv:sum('vidas_novas_prv'),
  };

  const grid = document.getElementById(gridId);
  grid.innerHTML = '';

  COLS.forEach(col => {
    const s = D.setores[col.key];
    if (!s) return;
    const tk_c = s.antecipacoes > 0 ? s.tpv / s.antecipacoes : 0;
    const tk_p = s.antecip_prv  > 0 ? s.tpv_prv / s.antecip_prv : 0;
    const extraClass = col.key === 'total' ? ' col-total' : '';
    grid.insertAdjacentHTML('beforeend', `
      <div class="setor-col${extraClass}">
        <div class="pill-header ${col.pill}">${col.label}</div>
        <div class="metrics-grid">
          ${mc('Vidas Antecipando #',       s.vidas,        s.vidas_prv,       fmtVal)}
          ${mc('Antecipações #',            s.antecipacoes, s.antecip_prv,     fmtVal)}
          ${mc('TPV R$',                    s.tpv,          s.tpv_prv,         fmtBRL)}
          ${mc('Ticket Médio R$',           tk_c,           tk_p,              fmtBRL)}
          ${mc('Abertura de Conta #',       s.abertura,     s.abertura_prv,    fmtVal)}
          ${mc('Vidas Novas Antecipando #', s.vidas_novas,  s.vidas_novas_prv, fmtInt)}
        </div>
      </div>`);
  });
}

// ================================================================
// SLIDE ENGINE
// ================================================================
let currentSlide = 0;
let progressTimer = null;
const TOTAL = 2;

function initDots() {
  // Cria dots apenas no primeiro slide (visível)
  const dotsEl = document.getElementById('progress-dots');
  dotsEl.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const d = document.createElement('div');
    d.className = 'dot' + (i === 0 ? ' active' : '');
    d.onclick = () => goToSlide(i);
    d.style.cursor = 'pointer';
    dotsEl.appendChild(d);
  }
}

function updateDots(idx) {
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.classList.toggle('active', i === idx);
  });
}

function goToSlide(idx) {
  document.getElementById(`slide-${currentSlide}`).classList.remove('active');
  currentSlide = idx % TOTAL;
  document.getElementById(`slide-${currentSlide}`).classList.add('active');
  updateDots(currentSlide);
  restartProgress();
}

function restartProgress() {
  if (progressTimer) clearTimeout(progressTimer);
  progressTimer = setTimeout(() => {
    goToSlide(currentSlide + 1);
  }, INTERVAL_MS);
}

// ================================================================
// INIT
// ================================================================
document.addEventListener('DOMContentLoaded', () => {
  // Renderiza os 3 grids
  renderGrid('grid-0', DATA);
  renderGrid('grid-1', DATA_PIX);

  // Preenche período e updated em cada slide
  [DATA, DATA_PIX].forEach((d, i) => {
    const per = `${d.cur_label} vs ${d.prev_label}`;
    document.getElementById(`s${i}-periodo`).textContent = per;
    document.getElementById(`s${i}-updated`).textContent = `Atualizado em ${UPDATED}`;
  });

  initDots();
  restartProgress();
});
</script>
